version: '3.8'

services:
  zookeeper:
    image: quay.io/debezium/zookeeper:2.4
    ports:
      - "2181:2181"
      - "2888:2888"
      - "3888:3888"

  kafka:
    image: quay.io/debezium/kafka:2.4
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - ZOOKEEPER_CONNECT=zookeeper:2181

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=shop_db
    # Ensure logical replication is enabled, crucial for Debezium CDC
    command: ["postgres", "-c", "wal_level=logical"] 
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  debezium:
    image: quay.io/debezium/connect:2.4
    restart: always
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    depends_on:
      - kafka
      - postgres

  # =========================================================
  # MinIO (S3-compatible object storage for Data Lake / Iceberg)
  # =========================================================
  minio:
    image: minio/minio:latest
    restart: always
    ports:
      - "8333:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminpassword
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 15;
      /usr/bin/mc config host add myminio http://minio:9000 admin adminpassword;
      /usr/bin/mc mb myminio/lakehouse-admin || true;
      exit 0;
      "

  # =========================================================
  # Apache Flink (Stream Processing framework)
  # =========================================================
  jobmanager:
    build: ./flink
    restart: always
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=adminpassword
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        s3.endpoint: http://minio:9000
        s3.access-key: admin
        s3.secret-key: adminpassword
        s3.path.style.access: true
    volumes:
      - ./flink_job.sql:/opt/flink/flink_job.sql
    depends_on:
      - kafka
      - minio
      - minio-init

  taskmanager:
    build: ./flink
    restart: always
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=adminpassword
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        s3.endpoint: http://minio:9000
        s3.access-key: admin
        s3.secret-key: adminpassword
        s3.path.style.access: true

  # =========================================================
  # PrestoDB (Serving & SQL Analytics for Hadoop Catalog)
  # =========================================================
  presto:
    image: prestodb/presto:latest
    ports:
      - "8080:8080"
    volumes:
      - ./presto/catalog:/opt/presto-server/etc/catalog
    depends_on:
      - minio
